# Generated by PatchCourt.
# Review this file before using it in CI.
# The initial architecture is inferred from the current project structure and dependency graph.
# Baseline mode: may_depend_on is inferred from current dependencies.

ignore:
  paths:
    - ".git/**"
    - "build/**"
    - "cmake-build-debug/**"
    - "cmake-build-release/**"
    - "node_modules/**"
    - "vendor/**"
    - "libs/**"
    - "third_party/**"
    - "external/**"
    - "generated/**"
    - "**/*.pb.h"
    - "**/*.pb.cc"
    - "**/*.pb.cpp"
    - "**/*.pb.go"
    - "**/*.grpc.pb.h"
    - "**/*.grpc.pb.cc"
    - "**/*.grpc.pb.go"

cpp:
  compile_commands:
    auto_discover: true
  include_paths:
    - "src"

layers:
  application:
    paths:
      - "src/application/**"
    may_depend_on:
      - cameras
      - configs
      - controllers
      - server

  cameras:
    paths:
      - "src/cameras/**"
    may_depend_on:
      - application
      - configs
      - domain
      - utils

  configs:
    paths:
      - "src/configs/**"
    may_depend_on: []

  controllers:
    paths:
      - "src/controllers/**"
    may_depend_on:
      - application
      - cameras
      - configs
      - domain
      - server
      - session
      - utils

  coroutines:
    paths:
      - "src/coroutines/**"
    may_depend_on: []

  domain:
    paths:
      - "src/domain/**"
    may_depend_on:
      - application
      - session
      - utils

  main_cc:
    paths:
      - "src/main.cc/**"
    may_depend_on:
      - application

  server:
    paths:
      - "src/server/**"
    may_depend_on:
      - domain
      - utils

  session:
    paths:
      - "src/session/**"
    may_depend_on:
      - domain
      - utils

  utils:
    paths:
      - "src/utils/**"
    may_depend_on:
      - application
      - domain

